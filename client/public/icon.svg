<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c026d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b2d6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Delivery truck body -->
  <rect x="100" y="210" width="200" height="120" rx="12" fill="white"/>
  <!-- Truck cabin -->
  <path d="M300 230 L300 330 L390 330 L390 270 L350 230 Z" fill="white" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  <!-- Cabin window -->
  <path d="M310 240 L340 240 L370 275 L310 275 Z" fill="#c026d3" opacity="0.3" stroke-linejoin="round"/>
  <!-- Bottom line -->
  <rect x="90" y="325" width="310" height="8" rx="4" fill="white" opacity="0.6"/>
  <!-- Left wheel -->
  <circle cx="175" cy="335" r="30" fill="#1e1e2e"/>
  <circle cx="175" cy="335" r="15" fill="white"/>
  <circle cx="175" cy="335" r="6" fill="#c026d3"/>
  <!-- Right wheel -->
  <circle cx="345" cy="335" r="30" fill="#1e1e2e"/>
  <circle cx="345" cy="335" r="15" fill="white"/>
  <circle cx="345" cy="335" r="6" fill="#c026d3"/>
  <!-- Package on truck -->
  <rect x="130" y="225" width="55" height="55" rx="6" fill="#c026d3" opacity="0.25"/>
  <rect x="200" y="235" width="45" height="45" rx="6" fill="#c026d3" opacity="0.18"/>
  <!-- Location pin above -->
  <g transform="translate(256, 120)">
    <path d="M0 55 L0 55 C-22 55 -30 35 -30 20 C-30 -2 -16 -20 0 -20 C16 -20 30 -2 30 20 C30 35 22 55 0 55Z" fill="white"/>
    <circle cx="0" cy="18" r="10" fill="#c026d3"/>
  </g>
</svg>
